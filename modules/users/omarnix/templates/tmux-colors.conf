# Tmux matugen theme - generated by DMS
# If colors render as ##ffffff, remove the # prefix below

set -g status-style "bg={{colors.surface_container.default.hex}},fg={{colors.on_surface.default.hex}}"
set -g status-left-style "bg={{colors.primary.default.hex}},fg={{colors.on_primary.default.hex}}"
set -g status-right-style "bg={{colors.surface_container.default.hex}},fg={{colors.on_surface.default.hex}}"

set -g window-status-style "bg={{colors.surface_container.default.hex}},fg={{colors.on_surface.default.hex}}"
set -g window-status-current-style "bg={{colors.primary.default.hex}},fg={{colors.on_primary.default.hex}}"
set -g window-status-activity-style "bg={{colors.tertiary.default.hex}},fg={{colors.on_tertiary.default.hex}}"

set -g pane-border-style "fg={{colors.outline.default.hex}}"
set -g pane-active-border-style "fg={{colors.primary.default.hex}}"

set -g message-style "bg={{colors.primary.default.hex}},fg={{colors.on_primary.default.hex}}"
