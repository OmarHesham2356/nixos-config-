monitor.bluez.rules = [
  {
    matches = [
      {
        device.name = "~bluez_card.*"
      }
    ]
    actions = {
      update-props = {
        bluez5.auto-connect = true
        bluez5.hfphsp-backend = "none"
        bluez5.a2dp.ldac.quality = "auto"
        bluez5.a2dp.sbc.max-bitrate = 0
        bluez5.codecs = "aac,sbc"
      }
    }
  }
]
