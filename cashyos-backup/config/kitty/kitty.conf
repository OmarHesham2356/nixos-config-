include /home/omarcash/.cache/wal/colors-kitty.conf

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12

background_opacity 0.85
background_blur 12

window_padding_width 8
window_margin_width 4
window_border_width 2px
hide_window_decorations no

active_border_color #cba6f7
inactive_border_color #45475a
bell_border_color #f38ba8

cursor_shape block
cursor_beam_thickness 2.0
cursor_blink_interval 0

shell_integration enabled
scrollback_lines 10000
enable_audio_bell no

confirm_os_window_close 0
remember_window_size no
initial_window_width 1200
initial_window_height 800

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backslash change_font_size all 0.0

tab_bar_style powerline
tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style_separator " "

active_tab_foreground #1e1e2e
active_tab_background #cba6f7
inactive_tab_foreground #a6adc8
inactive_tab_background #313244
